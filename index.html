<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Wishlist ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #faf6f0;
    --warm-white: #fff9f2;
    --parchment: #f0e8d8;
    --tan: #d4b896;
    --sand: #c4a882;
    --mocha: #8b6f52;
    --espresso: #4a3728;
    --dusty-rose: #c9967a;
    --sage: #9aab89;
    --ink: #2c1f14;
    --shadow: rgba(74,55,40,0.12);
  }

  body {
    background-color: var(--cream);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(212,184,150,0.25) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 80%, rgba(201,150,122,0.15) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c4a882' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  .toast {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--espresso); color: var(--cream);
    padding: 10px 24px; border-radius: 2px;
    font-size: 0.82rem; letter-spacing: 0.06em;
    opacity: 0; transition: all 0.3s ease;
    z-index: 200; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .loader { text-align: center; padding: 80px 24px; grid-column: 1/-1; }
  .loader-dot {
    display: inline-block; width: 8px; height: 8px;
    background: var(--tan); border-radius: 50%; margin: 0 4px;
    animation: bounce 1.2s ease infinite;
  }
  .loader-dot:nth-child(2) { animation-delay: 0.2s; }
  .loader-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-10px); }
  }

  header { text-align: center; padding: 64px 24px 40px; }
  .header-eyebrow {
    font-family: 'Dancing Script', cursive; font-size: 1.1rem;
    color: var(--dusty-rose); letter-spacing: 0.05em; margin-bottom: 10px;
    opacity: 0; animation: fadeUp 0.7s ease forwards 0.1s;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.6rem, 6vw, 4.2rem); font-weight: 600;
    color: var(--espresso); line-height: 1.1; letter-spacing: -0.01em;
    opacity: 0; animation: fadeUp 0.7s ease forwards 0.25s;
  }
  h1 em { font-style: italic; color: var(--dusty-rose); }
  .header-rule {
    width: 80px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--tan), transparent);
    margin: 20px auto; opacity: 0; animation: fadeUp 0.7s ease forwards 0.4s;
  }
  .header-sub {
    font-size: 0.9rem; color: var(--mocha); letter-spacing: 0.08em;
    text-transform: uppercase; opacity: 0; animation: fadeUp 0.7s ease forwards 0.5s;
  }
  .header-edit-hint {
    display: none; font-size: 0.7rem; color: var(--sand);
    letter-spacing: 0.08em; margin-top: 14px; cursor: pointer;
    text-transform: uppercase; transition: color 0.15s;
  }
  .header-edit-hint:hover { color: var(--dusty-rose); }
  body.admin-mode .header-edit-hint { display: block; }

  .add-btn-wrap {
    text-align: center; margin-bottom: 48px; display: none;
    opacity: 0; animation: fadeUp 0.7s ease forwards 0.6s;
  }
  body.admin-mode .add-btn-wrap { display: block; }
  .add-btn {
    background: var(--espresso); color: var(--cream); border: none;
    padding: 14px 36px; font-family: 'Lato', sans-serif;
    font-size: 0.82rem; letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer; border-radius: 2px; transition: background 0.2s, transform 0.15s;
  }
  .add-btn:hover { background: var(--mocha); transform: translateY(-1px); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 28px; max-width: 1200px; margin: 0 auto; padding: 0 28px 80px;
  }

  .card {
    background: var(--warm-white); border-radius: 4px; overflow: hidden;
    box-shadow: 0 2px 12px var(--shadow), 0 0 0 1px rgba(196,168,130,0.15);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    opacity: 0; animation: fadeUp 0.6s ease forwards;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px var(--shadow), 0 0 0 1px rgba(196,168,130,0.25);
  }
  .card.claimed { opacity: 0.58; }
  .card.claimed .card-img-wrap::after {
    content: 'Claimed ✓'; position: absolute; inset: 0;
    background: rgba(74,55,40,0.55);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Dancing Script', cursive; font-size: 1.8rem;
    color: #fff; letter-spacing: 0.04em;
  }
  .card-img-wrap {
    position: relative; width: 100%; height: 220px;
    overflow: hidden; background: var(--parchment);
  }
  .card-img-wrap img {
    width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease;
  }
  .card:hover .card-img-wrap img { transform: scale(1.04); }
  .card-img-placeholder {
    width: 100%; height: 100%; display: flex;
    align-items: center; justify-content: center;
    font-size: 2.5rem; color: var(--tan);
    background: linear-gradient(135deg, var(--parchment), var(--cream));
  }
  .priority-tag {
    position: absolute; top: 12px; left: 12px;
    background: var(--dusty-rose); color: #fff;
    font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 2px; font-family: 'Lato', sans-serif;
  }
  .card-body { padding: 20px 20px 16px; }
  .card-name {
    font-family: 'Playfair Display', serif; font-size: 1.15rem;
    font-weight: 600; color: var(--espresso); margin-bottom: 6px; line-height: 1.3;
  }
  .card-price {
    font-family: 'Dancing Script', cursive; font-size: 1.1rem;
    color: var(--dusty-rose); margin-bottom: 10px;
  }
  .card-notes {
    font-size: 0.83rem; color: var(--mocha); line-height: 1.6; margin-bottom: 14px;
  }
  .vendor-block { border-top: 1px solid var(--parchment); padding-top: 12px; margin-bottom: 14px; }
  .vendor-label { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--sand); margin-bottom: 4px; }
  .vendor-name { font-size: 0.85rem; color: var(--espresso); }
  .vendor-contact { font-size: 0.8rem; color: var(--mocha); margin-top: 2px; }
  .vendor-contact a { color: var(--dusty-rose); text-decoration: none; }
  .vendor-contact a:hover { text-decoration: underline; }

  .claim-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .claim-label {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    font-size: 0.82rem; color: var(--mocha); letter-spacing: 0.05em; user-select: none;
  }
  .claim-label input[type="checkbox"] { display: none; }
  .checkmark {
    width: 18px; height: 18px; border: 1.5px solid var(--tan); border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s; flex-shrink: 0;
  }
  .claim-label input:checked + .checkmark { background: var(--sage); border-color: var(--sage); }
  .claim-label input:checked + .checkmark::after { content: '✓'; font-size: 11px; color: #fff; }

  .card-actions { display: flex; gap: 8px; }
  .action-btn {
    background: none; border: 1px solid var(--parchment); color: var(--sand);
    width: 30px; height: 30px; border-radius: 2px; cursor: pointer;
    font-size: 0.8rem; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .action-btn:hover { border-color: var(--mocha); color: var(--mocha); }
  .action-btn.del:hover { border-color: #c0685a; color: #c0685a; }

  .empty { grid-column: 1/-1; text-align: center; padding: 80px 24px; }
  .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
  .empty p { font-family: 'Playfair Display', serif; font-style: italic; color: var(--mocha); font-size: 1.1rem; }

  .overlay {
    position: fixed; inset: 0; background: rgba(44,31,20,0.55);
    backdrop-filter: blur(3px); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--warm-white); border-radius: 4px;
    width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
    padding: 40px 36px 36px; position: relative;
    transform: translateY(16px); transition: transform 0.25s ease;
    box-shadow: 0 24px 64px rgba(44,31,20,0.3);
  }
  .overlay.open .modal { transform: translateY(0); }
  .modal-title {
    font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 600;
    color: var(--espresso); margin-bottom: 28px;
  }
  .modal-title em { font-style: italic; color: var(--dusty-rose); }
  .close-modal {
    position: absolute; top: 16px; right: 20px;
    background: none; border: none; font-size: 1.3rem;
    color: var(--sand); cursor: pointer; padding: 4px;
  }
  .close-modal:hover { color: var(--espresso); }

  .field { margin-bottom: 20px; }
  .field label {
    display: block; font-size: 0.7rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--sand); margin-bottom: 6px;
  }
  .field input, .field textarea, .field select {
    width: 100%; padding: 10px 14px;
    border: 1px solid var(--parchment); border-radius: 2px;
    background: var(--cream); font-family: 'Lato', sans-serif;
    font-size: 0.9rem; font-weight: 300; color: var(--ink);
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--tan); }
  .field textarea { resize: vertical; min-height: 72px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 28px; }
  .btn-cancel {
    background: none; border: 1px solid var(--parchment); color: var(--mocha);
    padding: 11px 24px; font-family: 'Lato', sans-serif;
    font-size: 0.82rem; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; border-radius: 2px; transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: var(--mocha); }
  .btn-save {
    background: var(--espresso); color: var(--cream); border: none;
    padding: 11px 28px; font-family: 'Lato', sans-serif;
    font-size: 0.82rem; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; border-radius: 2px; transition: background 0.15s;
  }
  .btn-save:hover { background: var(--mocha); }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

  .img-preview {
    margin-top: 8px; width: 100%; height: 120px;
    object-fit: cover; border-radius: 2px;
    display: none; border: 1px solid var(--parchment);
  }
  .img-preview.show { display: block; }

  .admin-badge {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--espresso); color: var(--cream); border: none;
    padding: 10px 18px; font-family: 'Lato', sans-serif;
    font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; border-radius: 2px; opacity: 0.7; transition: opacity 0.2s; z-index: 50;
  }
  .admin-badge:hover { opacity: 1; }
  body.admin-mode .admin-badge { background: var(--dusty-rose); opacity: 1; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--tan); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow" id="headerEyebrow">a curated collection of</div>
  <h1 id="headerTitle">My <em>Wishlist</em></h1>
  <div class="header-rule"></div>
  <div class="header-sub" id="headerSub">Things I love &amp; hope to have</div>
  <div class="header-edit-hint" onclick="openHeaderModal()">✎ Edit header text</div>
</header>

<div class="add-btn-wrap">
  <button class="add-btn" onclick="openItemModal()">+ Add an Item</button>
</div>

<div class="grid" id="grid">
  <div class="loader">
    <div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div>
  </div>
</div>

<!-- Item Modal -->
<div class="overlay" id="itemOverlay">
  <div class="modal">
    <button class="close-modal" onclick="closeItemModal()">✕</button>
    <div class="modal-title" id="itemModalTitle">Add a <em>wish</em></div>
    <div class="field"><label>Item Name *</label><input type="text" id="f-name" placeholder="e.g. Vintage Silk Scarf" /></div>
    <div class="field-row">
      <div class="field"><label>Price</label><input type="text" id="f-price" placeholder="e.g. $120" /></div>
      <div class="field"><label>Priority</label>
        <select id="f-priority">
          <option value="">None</option>
          <option value="Top Pick">Top Pick</option>
          <option value="Dreaming">Dreaming</option>
          <option value="Someday">Someday</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Notes</label><textarea id="f-notes" placeholder="Size, colour preference, why you love it..."></textarea></div>
    <div class="field">
      <label>Image URL</label>
      <input type="text" id="f-img" placeholder="Paste an image link here" oninput="previewImg()" />
      <img id="img-preview" class="img-preview" src="" alt="preview" />
    </div>
    <div class="field"><label>Vendor / Shop Name</label><input type="text" id="f-vendor" placeholder="e.g. The Silk Studio" /></div>
    <div class="field"><label>Vendor Contact or Link</label><input type="text" id="f-contact" placeholder="e.g. thesilkstudio.com or @handle" /></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeItemModal()">Cancel</button>
      <button class="btn-save" id="itemSaveBtn" onclick="saveItem()">Save to List</button>
    </div>
  </div>
</div>

<!-- Header Edit Modal -->
<div class="overlay" id="headerOverlay">
  <div class="modal">
    <button class="close-modal" onclick="closeHeaderModal()">✕</button>
    <div class="modal-title">Edit <em>Header</em></div>
    <div class="field"><label>Top Script Line</label><input type="text" id="h-eyebrow" placeholder="a curated collection of" /></div>
    <div class="field"><label>Main Title (last word becomes italic automatically)</label><input type="text" id="h-title" placeholder="My Wishlist" /></div>
    <div class="field"><label>Subtitle</label><input type="text" id="h-sub" placeholder="Things I love & hope to have" /></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeHeaderModal()">Cancel</button>
      <button class="btn-save" onclick="saveHeader()">Save Header</button>
    </div>
  </div>
</div>

<button class="admin-badge" id="adminBadge" onclick="toggleAdmin()">⚙ Admin</button>
<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://zylsfmqfibpxyhmqwdkv.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5bHNmbXFmaWJweHlobXF3ZGt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDc5MzcsImV4cCI6MjA5MjcyMzkzN30.TUsX7cFBU43qWTmniW5xQR7z0mgvm_jmD8SHgQJLo3E';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const ADMIN_PIN = '1234'; // ← Change this to your own PIN
  let isAdmin = false;
  let editingId = null;
  let items = [];

  let headerData = JSON.parse(localStorage.getItem('wishlist_header') || 'null') || {
    eyebrow: 'a curated collection of',
    title: 'My Wishlist',
    sub: 'Things I love & hope to have'
  };

  function applyHeader() {
    document.getElementById('headerEyebrow').textContent = headerData.eyebrow;
    document.title = headerData.title + ' ✦';
    const words = headerData.title.trim().split(' ');
    const last = words.pop();
    document.getElementById('headerTitle').innerHTML =
      (words.length ? words.join(' ') + ' ' : '') + `<em>${last}</em>`;
    document.getElementById('headerSub').textContent = headerData.sub;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatContact(c) {
    if (!c) return '';
    const s = esc(c);
    if (c.startsWith('http') || c.startsWith('www')) {
      const url = c.startsWith('http') ? c : 'https://' + c;
      return `<a href="${url}" target="_blank" rel="noopener">${s}</a>`;
    }
    if (c.includes('@') && !c.startsWith('@')) return `<a href="mailto:${c}">${s}</a>`;
    return s;
  }

  async function loadItems() {
    const { data, error } = await db.from('items').select('*')
      .order('sort_order', { ascending: true }).order('id', { ascending: true });
    if (error) {
      showToast('Could not load — check Supabase');
      document.getElementById('grid').innerHTML =
        `<div class="empty"><div class="empty-icon">✦</div><p>Could not connect to database.</p></div>`;
      return;
    }
    items = data || [];
    render();
  }

  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    if (!items.length) {
      grid.innerHTML = `<div class="empty"><div class="empty-icon">✦</div><p>Your wishlist is empty — start adding things you love.</p></div>`;
      return;
    }
    items.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'card' + (item.claimed ? ' claimed' : '');
      card.style.animationDelay = (i * 0.07) + 's';

      const imgHtml = item.img
        ? `<img src="${esc(item.img)}" alt="${esc(item.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
           <div class="card-img-placeholder" style="display:none">✦</div>`
        : `<div class="card-img-placeholder">✦</div>`;

      const vendorHtml = (item.vendor || item.contact) ? `
        <div class="vendor-block">
          <div class="vendor-label">From</div>
          ${item.vendor ? `<div class="vendor-name">${esc(item.vendor)}</div>` : ''}
          ${item.contact ? `<div class="vendor-contact">${formatContact(item.contact)}</div>` : ''}
        </div>` : '';

      const adminActions = isAdmin ? `
        <div class="card-actions">
          <button class="action-btn" onclick="editItem(${item.id})" title="Edit">✎</button>
          <button class="action-btn del" onclick="deleteItem(${item.id})" title="Delete">✕</button>
        </div>` : '';

      card.innerHTML = `
        <div class="card-img-wrap">
          ${imgHtml}
          ${item.priority ? `<div class="priority-tag">${esc(item.priority)}</div>` : ''}
        </div>
        <div class="card-body">
          <div class="card-name">${esc(item.name)}</div>
          ${item.price ? `<div class="card-price">${esc(item.price)}</div>` : ''}
          ${item.notes ? `<div class="card-notes">${esc(item.notes)}</div>` : ''}
          ${vendorHtml}
          <div class="claim-row">
            <label class="claim-label">
              <input type="checkbox" ${item.claimed ? 'checked' : ''} onchange="toggleClaim(${item.id}, this.checked)"/>
              <span class="checkmark"></span>
              ${item.claimed ? 'Claimed' : 'Mark as claimed'}
            </label>
            ${adminActions}
          </div>
        </div>`;
      grid.appendChild(card);
    });
  }

  async function toggleClaim(id, val) {
    const { error } = await db.from('items').update({ claimed: val }).eq('id', id);
    if (error) { showToast('Could not update — try again'); return; }
    const item = items.find(i => i.id === id);
    if (item) item.claimed = val;
    render();
    showToast(val ? 'Marked as claimed ✓' : 'Unclaimed');
  }

  function openItemModal(id = null) {
    editingId = id; clearItemForm();
    if (id) {
      const item = items.find(i => i.id === id);
      if (item) {
        document.getElementById('f-name').value = item.name || '';
        document.getElementById('f-price').value = item.price || '';
        document.getElementById('f-priority').value = item.priority || '';
        document.getElementById('f-notes').value = item.notes || '';
        document.getElementById('f-img').value = item.img || '';
        document.getElementById('f-vendor').value = item.vendor || '';
        document.getElementById('f-contact').value = item.contact || '';
        previewImg();
      }
      document.getElementById('itemModalTitle').innerHTML = 'Edit <em>this wish</em>';
    } else {
      document.getElementById('itemModalTitle').innerHTML = 'Add a <em>wish</em>';
    }
    document.getElementById('itemOverlay').classList.add('open');
  }

  function closeItemModal() {
    document.getElementById('itemOverlay').classList.remove('open');
    editingId = null; clearItemForm();
  }

  function clearItemForm() {
    ['f-name','f-price','f-notes','f-img','f-vendor','f-contact'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-priority').value = '';
    document.getElementById('img-preview').className = 'img-preview';
  }

  async function saveItem() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { document.getElementById('f-name').focus(); return; }
    const btn = document.getElementById('itemSaveBtn');
    btn.disabled = true; btn.textContent = 'Saving…';

    const data = {
      name,
      price:    document.getElementById('f-price').value.trim(),
      priority: document.getElementById('f-priority').value,
      notes:    document.getElementById('f-notes').value.trim(),
      img:      document.getElementById('f-img').value.trim(),
      vendor:   document.getElementById('f-vendor').value.trim(),
      contact:  document.getElementById('f-contact').value.trim(),
    };

    let error;
    if (editingId) {
      ({ error } = await db.from('items').update(data).eq('id', editingId));
    } else {
      ({ error } = await db.from('items').insert([{ ...data, claimed: false, sort_order: items.length }]));
    }

    btn.disabled = false; btn.textContent = 'Save to List';
    if (error) { showToast('Error saving — check connection'); console.error(error); return; }
    showToast(editingId ? 'Item updated ✓' : 'Added to wishlist ✓');
    closeItemModal(); await loadItems();
  }

  function editItem(id) { openItemModal(id); }

  async function deleteItem(id) {
    if (!confirm('Remove this item from your wishlist?')) return;
    const { error } = await db.from('items').delete().eq('id', id);
    if (error) { showToast('Could not delete — try again'); return; }
    showToast('Item removed'); await loadItems();
  }

  function previewImg() {
    const url = document.getElementById('f-img').value.trim();
    const p = document.getElementById('img-preview');
    p.className = url ? 'img-preview show' : 'img-preview';
    if (url) p.src = url;
  }

  function openHeaderModal() {
    document.getElementById('h-eyebrow').value = headerData.eyebrow;
    document.getElementById('h-title').value = headerData.title;
    document.getElementById('h-sub').value = headerData.sub;
    document.getElementById('headerOverlay').classList.add('open');
  }
  function closeHeaderModal() { document.getElementById('headerOverlay').classList.remove('open'); }
  function saveHeader() {
    headerData = {
      eyebrow: document.getElementById('h-eyebrow').value.trim() || headerData.eyebrow,
      title:   document.getElementById('h-title').value.trim()   || headerData.title,
      sub:     document.getElementById('h-sub').value.trim()     || headerData.sub,
    };
    localStorage.setItem('wishlist_header', JSON.stringify(headerData));
    applyHeader(); closeHeaderModal(); showToast('Header updated ✓');
  }

  function toggleAdmin() {
    if (isAdmin) {
      isAdmin = false;
      document.body.classList.remove('admin-mode');
      document.getElementById('adminBadge').textContent = '⚙ Admin';
      render(); return;
    }
    const pin = prompt('Enter admin PIN:');
    if (pin === ADMIN_PIN) {
      isAdmin = true;
      document.body.classList.add('admin-mode');
      document.getElementById('adminBadge').textContent = '✕ Exit Admin';
      render(); showToast('Admin mode on');
    } else if (pin !== null) { showToast('Incorrect PIN'); }
  }

  document.getElementById('itemOverlay').addEventListener('click', function(e) { if (e.target===this) closeItemModal(); });
  document.getElementById('headerOverlay').addEventListener('click', function(e) { if (e.target===this) closeHeaderModal(); });

  applyHeader();
  loadItems();
</script>
</body>
</html>
